name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Keep health endpoint warm
        run: |
          curl --fail --silent --show-error \
            --retry 1 \
            --retry-delay 20 \
            --retry-all-errors \
            --max-time 90 \
            https://stockreviewbackend.onrender.com/api/health
